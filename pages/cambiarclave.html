<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cambiar contraseña</title>

<link rel="stylesheet" href="../css/panel.css">

</head>

<body>

<div class="panel">

<header class="header">
<h1>Cambiar contraseña</h1>
<p>Por seguridad debes crear una nueva contraseña</p>
</header>

<div class="card">

<form id="formCambiarClave">

<label>Nueva contraseña</label>
<div class="input-password">
  <input
    type="password"
    id="nuevaPassword"
    placeholder="Nueva contraseña"
    required
  >
  <span id="toggleNueva" class="toggle-password">👁</span>
</div>

<label>Confirmar contraseña</label>
<div class="input-password">
  <input
    type="password"
    id="confirmarPassword"
    placeholder="Confirmar contraseña"
    required
  >
  <span id="toggleConfirmar" class="toggle-password">👁</span>
</div>

<button type="submit">
Guardar nueva contraseña
</button>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../js/cambiarclave.js"></script>

</body>

</html>
